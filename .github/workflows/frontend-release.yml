name: Frontend Release Artifact

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/Tag/SHA to build (e.g. main, dev)'
        required: true
        default: 'main'
        type: string
      release_id:
        description: 'Release id in OSS path: deploy/e-supply/<release_id>'
        required: false
        default: ''
        type: string

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Resolve release id
        id: meta
        run: |
          set -euo pipefail
          INPUT_RELEASE_ID="${{ inputs.release_id }}"
          if [ -n "$INPUT_RELEASE_ID" ]; then
            RELEASE_ID="$INPUT_RELEASE_ID"
          else
            SAFE_REF="$(echo "${{ inputs.source_ref }}" | tr '/:@ ' '-' | tr -cd '[:alnum:]-._')"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            TS="$(date -u +%Y%m%d-%H%M%S)"
            RELEASE_ID="${SAFE_REF}-${TS}-${SHORT_SHA}"
          fi
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          test -n "$VITE_CLERK_PUBLISHABLE_KEY"
          npm run build

      - name: Pack dist
        run: tar -czf e-supply-front.tgz -C dist .

      - name: Install aliyun cli
        run: |
          ARCH="$(uname -m)"
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            CLI_URL="https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-arm64.tgz"
          else
            CLI_URL="https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz"
          fi
          curl -fsSL "$CLI_URL" -o aliyun.tgz
          tar -xzf aliyun.tgz
          sudo mv aliyun /usr/local/bin/aliyun

      - name: Configure aliyun cli
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          REGION="${OSS_REGION:-cn-hangzhou}"
          aliyun configure set --profile akProfile \
            --region "$REGION" \
            --mode AK \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET"

      - name: Upload release artifact to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          test -n "$OSS_BUCKET"
          OSS_PATH="oss://${OSS_BUCKET}/deploy/e-supply/${{ steps.meta.outputs.release_id }}/e-supply-front.tgz"
          aliyun oss cp e-supply-front.tgz "$OSS_PATH"
          echo "uploaded=$OSS_PATH"
          printf "release_id=%s\n" "${{ steps.meta.outputs.release_id }}" >> "$GITHUB_STEP_SUMMARY"
